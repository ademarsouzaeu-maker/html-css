<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        table {
            width: 400px;

        }
        td, th {
            border: 1px solid black;
            padding: 8px;
        }
        thead {
            background-color: gray;
            color: white;
        }
        td.num {
            text-align: right;
        }
    </style>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!--
        ANATOMIA PARA TABELAS GRANDES
        TABLE
            THEAD
                TR, TD, TH
            TBORY
                TR, TD, TH
            TFOOT
                TR, TD, TH

    -->
    <Table>
        <THead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>
            
        </THead>
        <TBODY>
            <tr>
                <td>São Paulo</td>
                <td class="num">45.519.049</td>
            </tr>
            <tr>
                <td>Minas Gerais</td>
                <td class="num">21.168.791</td>
.            </tr>.
            <tr>
                <td>Rio de Janeiro</td>
                <td class="num">17 264 943</td>
            </tr>
            <tr>
                <td>Bahia</td>
                <td class="num">14.873.064</td>
            </tr>
        </TBODY>
        <tfoot>
            <tr>
                <th>Total de Habitantes
                <td class="num"><strong>000000</strong></td>
                    
            </tr>
        </tfoot>
    </Table>
    
</body>
</html>
